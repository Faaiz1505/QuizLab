<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Quiz App</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>/* Base & Reset */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
:root {
  --bg1: #0b0f15;
  --bg2: #111426;

  /* Glass Layer */
  --card: rgba(255, 255, 255, 0.04);
  --glass: rgba(255, 255, 255, 0.06);

  /* Premium Gradient Accents */
  --accent: #8a63f7; /* Modern purple */
  --accent-2: #4dd7ff; /* Soft cyan */
  --accent-3: #c084fc; /* Purple glow for highlights */
  --accent-dark: #5b3cc4;

  /* Status Colors */
  --success: #3ee78c;
  --warning: #facc15;
  --error: #ff5e78;

  /* Text Colors */
  --text-main: #f3f6ff;
  --text-soft: #c8d1e0;
  --text-dim: #9aa4b2;
}
html,
body,
#root {
  height: 100%;
}
body {
  font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto,
    "Helvetica Neue", Arial;

  background: radial-gradient(
      900px 700px at 20% 20%,
      rgba(138, 99, 247, 0.14),
      transparent
    ),
    radial-gradient(
      700px 500px at 85% 80%,
      rgba(77, 215, 255, 0.08),
      transparent
    ),
    linear-gradient(135deg, #0b0f15, #171c28);

  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* App shell */
.app {
  background: linear-gradient(
      150deg,
      rgba(24, 1, 88, 0.08),
      rgba(22, 28, 41, 0.6)
    ),
    rgba(255, 255, 255, 0.03);

  border-radius: 22px;
  padding: 26px 30px;
  width: 100%;
  max-width: 920px;
  backdrop-filter: blur(18px) saturate(140%);
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
  transition: background 0.3s ease;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  margin-bottom: 18px;
}
.brand {
  font-size: 18px;
  letter-spacing: 0.2px;
  color: #fff;
  font-weight: 700;
}
.controls {
  display: flex;
  gap: 12px;
  align-items: center;
}
.warning {
  color: #ff6b6b;
  font-style: italic;
}
select {
  background: var(--glass);
  color: #e6eef8;
  border: 1px solid rgba(255, 255, 255, 0.06);
  padding: 8px 12px;
  border-radius: 10px;
  outline: none;
}

select option {
  background: var(--bg1);
  color: #e6eef8;
}

/* Buttons */
.btn {
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.btn:active {
  transform: translateY(1px);
}
.btn:hover {
  transform: translateY(-1.5px);
}
.btn.primary {
  background: linear-gradient(90deg, var(--accent), var(--accent-3));
  color: #fff;
  box-shadow: 0 8px 28px rgba(138, 99, 247, 0.28);
}
.btn.primary:hover {
  box-shadow: 0 14px 38px rgba(138, 99, 247, 0.38);
  transform: translateY(-2px);
}

.btn.secondary {
  background: linear-gradient(90deg, var(--accent-2), var(--accent));
  color: #e8f1ff;
  border: 1px solid rgba(255, 255, 255, 0.08);
}
.btn.secondary:hover {
  background: linear-gradient(90deg, var(--accent-3), var(--accent));
}

/* Card */
.card {
  background: linear-gradient(
    180deg,
    rgba(255, 255, 255, 0.02),
    rgba(255, 255, 255, 0.01)
  );
  border-radius: 16px;
  padding: 12px;
  box-shadow: 0 20px 60px rgba(2, 6, 23, 0.6);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.03);
}

/* Progress and meta */
.progress-wrap {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.progress {
  flex: 1;
  height: 10px;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 10px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(
    90deg,
    var(--accent),
    var(--accent-2),
    var(--accent-3)
  );
  transition: width 0.45s cubic-bezier(0.25, 0.9, 0.35, 1);
}
.meta-right {
  display: flex;
  gap: 12px;
  align-items: center;
}
.timer {
  font-weight: 700;
  color: var(--accent-2);
  min-width: 56px;
  text-align: right;
}

/* Question area */
.question-area {
  padding: 12px 0;
}
.question {
  font-size: 20px;
  font-weight: 600;
  color: #eef6ff;
  margin-bottom: 16px;
  line-height: 1.3;
}
.options {
  list-style: none;
  display: grid;
  gap: 12px;
}
.option {
  background: rgba(255, 255, 255, 0.02);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  border: 1px solid rgba(255, 255, 255, 0.03);
  transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
  user-select: none;
}
.option:hover {
  transform: translateY(-4px);
}
.option[aria-selected="true"] {
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
}

/* states for correct/wrong */
.option.correct {
  background: linear-gradient(
    90deg,
    rgba(32, 186, 137, 0.14),
    rgba(32, 186, 137, 0.08)
  );
  border-color: rgba(32, 186, 137, 0.45);
  color: #dffdf2;
}
.option.wrong {
  background: linear-gradient(
    90deg,
    rgba(255, 90, 90, 0.08),
    rgba(255, 90, 90, 0.04)
  );
  border-color: rgba(255, 90, 90, 0.35);
  color: #ffdede;
  opacity: 0.95;
}

/* footer */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 18px;
  gap: 12px;
}
.score-panel {
  display: flex;
  gap: 20px;
  align-items: center;
  color: var(--muted);
}
.score {
  font-weight: 700;
  color: #fff;
}
.qcount {
  color: var(--muted);
}

/* Result box */
.result-box {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 18px 12px;
}
.result-card {
  width: 100%;
  max-width: 520px;
  padding: 24px;
  border-radius: 18px;
  text-align: center;
  animation: popIn 0.6s cubic-bezier(0.2, 0.9, 0.4, 1);
  background: linear-gradient(
    180deg,
    rgba(138, 99, 247, 0.08),
    rgba(255, 255, 255, 0.02)
  );
  border: 1px solid rgba(255, 255, 255, 0.06);
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(16px) saturate(160%);
}
.result-card h2 {
  font-size: 22px;
  color: #fff;
  margin-bottom: 8px;
}
.final-score {
  font-weight: 700;
  font-size: 18px;
  margin-bottom: 6px;
  color: var(--accent-2);
}
.percent-text {
  font-size: 34px;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 6px;
}
.best-text {
  color: var(--muted);
  margin-bottom: 12px;
}

footer {
  margin-top: 16px;
text-align: center;
font-size: 14px;
}

/* confetti styles */
#confetti-wrap {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 40;
}
.confetti {
  position: absolute;
  width: 10px;
  height: 14px;
  opacity: 0.95;
  will-change: transform, opacity;
  transform-origin: center;
  border-radius: 2px;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  0% {
    transform: translateY(-10vh) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(110vh) rotate(720deg);
    opacity: 0;
  }
}

/* small animations */
@keyframes popIn {
  from {
    transform: translateY(18px) scale(0.98);
    opacity: 0;
  }
  to {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
}

/* utility */
.hidden {
  display: none !important;
}
.sr-only {
  position: absolute !important;
  left: -9999px;
  top: auto;
  width: 1px;
  height: 1px;
  overflow: hidden;
}

/* responsive */
@media (max-width: 640px) {
  .question {
    font-size: 18px;
  }
  .result-card {
    padding: 18px;
  }
  .brand {
    font-size: 16px;
  }
  .controls {
    gap: 8px;
  }
}

@media (max-width: 420px) {
  body {
    padding: 0px;
  }
.app {
  padding: 20px 8px;
}
  .question {
    font-size: 16px;
  }
  .result-card {
    padding: 14px;
  }
  .brand {
    font-size: 14px;
  }
  .controls {
    gap: 6px;
  }
  select {
    padding: 6px 10px;
    font-size: 11px;
  }
  select option {
    font-size: 14px;
  }
  .btn.primary {
    margin-bottom: 10px;
  }
}</style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1 class="brand">NafasHub • Quiz Lab</h1>
        <div class="controls">
          <label for="category" class="sr-only">Choose category</label>
          <select id="category" aria-label="Choose quiz category">
            <option value="pick" id="pick">pick a subject</option>
            <option value="sta">STA111</option>
            <option value="science">Science</option>
            <option value="history">History</option>
          </select>
          <button id="start-btn" class="btn primary" aria-label="Start quiz">
            Start
          </button>
        </div>
      </header>

      <section class="card" id="quiz-card" aria-live="polite">
        <div class="meta">
          <div class="progress-wrap" aria-hidden="true">
            <div id="progress" class="progress">
              <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="meta-right">
              <div id="timer" class="timer" aria-live="polite">25s</div>
              <div id="highscore" class="highscore" aria-live="polite">
                High: —
              </div>
            </div>
          </div>
        </div>

        <div id="question-area" class="question-area hidden">
          <h2 id="question-text" class="question">Question will appear here</h2>

          <ul
            id="options"
            class="options"
            role="listbox"
            aria-label="Answer choices"
          >
            <!-- options injected here -->
          </ul>

          <div class="footer">
            <div class="score-panel">
              <div id="score" class="score">Score: 0</div>
              <div id="qcount" class="qcount">0 / 0</div>
            </div>

            <button
              id="next-btn"
              class="btn secondary hidden"
              aria-label="Next question"
            >
              Next
            </button>
          </div>
        </div>

        <div
          id="result-box"
          class="result-box hidden"
          role="status"
          aria-live="polite"
        >
          <div class="result-card">
            <h2 id="final-title" class="">Well done!</h2>
            <p id="score-text" class="final-score">You scored 0 / 0</p>
            <p id="percent-text" class="percent-text">0%</p>
            <p id="best-text" class="best-text">Best for this category: —</p>
            <div class="result-actions">
              <button id="retry-btn" class="btn primary">Try Again</button>
              <button id="change-btn" class="btn secondary">
                Change Category
              </button>
            </div>
          </div>
        </div>
      </section>
        <footer>
      Created with ❤️ by NafasHub 
    </footer>
    </main>

    <!-- confetti container -->
    <div id="confetti-wrap" aria-hidden="true"></div>

    
    <script>
    /* Quiz App - fully functional with:
   - sounds via WebAudio
   - categories and question sets
   - timer, progress, next logic
   - highest score saved in localStorage per category
   - celebration confetti + result animation
   - clear inline comments for learning
*/

document.addEventListener("DOMContentLoaded", () => {
  /* ---------------------------
     Element references
     --------------------------- */
  const startBtn = document.getElementById("start-btn");
  const categorySelect = document.getElementById("category");
  const progressBar = document.getElementById("progress-bar");
  const questionArea = document.getElementById("question-area");
  const questionText = document.getElementById("question-text");
  const optionsBox = document.getElementById("options");
  const timerEl = document.getElementById("timer");
  const nextBtn = document.getElementById("next-btn");
  const scoreEl = document.getElementById("score");
  const qcountEl = document.getElementById("qcount");
  const resultBox = document.getElementById("result-box");
  const scoreText = document.getElementById("score-text");
  const percentText = document.getElementById("percent-text");
  const bestText = document.getElementById("best-text");
  const highscoreLabel = document.getElementById("highscore");
  const retryBtn = document.getElementById("retry-btn");
  const changeBtn = document.getElementById("change-btn");
  const confettiWrap = document.getElementById("confetti-wrap");
  const pickOption = document.getElementById("pick");

  /* ---------------------------
     Questions by category
     Add/remove category objects here
     --------------------------- */
  const QUESTION_BANK = {
  sta: [
